<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Hash Consistency</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .test-section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Hash Consistency Test</h1>

    <div class="test-section">
        <h3>Test Hash Functions Match</h3>
        <button onclick="testHashConsistency()">Test Recorder vs Evidence Drawer</button>
        <div id="consistency-results"></div>
    </div>

    <script>
        // Import the same functions from recorder.js
        const enc = new TextEncoder();

        function canonicalize(obj) {
          if (obj === null || typeof obj !== 'object') return obj;
          if (Array.isArray(obj)) return obj.map(canonicalize);
          const out = {};
          Object.keys(obj).sort().forEach(k => {
            const v = obj[k];
            out[k] = canonicalize(v);
          });
          return out;
        }

        function canonicalString(obj) {
          return JSON.stringify(canonicalize(obj));
        }

        function concatBytes(a, b) {
          const out = new Uint8Array(a.length + b.length);
          out.set(a, 0);
          out.set(b, a.length);
          return out;
        }

        function hex(buf) {
          const v = new Uint8Array(buf);
          let s = "";
          for (let i = 0; i < v.length; i++) s += v[i].toString(16).padStart(2, "0");
          return s;
        }

        async function computeEventRoot(rows) {
          let prev = new Uint8Array(32);
          for (const ev of rows) {
            const s = canonicalString(ev);
            const data = concatBytes(prev, enc.encode(s));
            prev = new Uint8Array(await crypto.subtle.digest('SHA-256', data));
          }
          return "sha256-" + hex(prev);
        }

        async function testHashConsistency() {
            const results = document.getElementById('consistency-results');
            results.innerHTML = '<p>Testing hash consistency...</p>';

            // Test events that match the user's reported issue
            const testEvents = [
                { t: 1.234, type: "param", name: "seed", value: 20250827 },
                { t: 2.345, type: "pointer", op: "down", x: 123, y: 456 },
                { t: 3.456, type: "measure", name: "cfl", value: 0.85 },
                { t: 4.567, type: "state", digest: "ps-abc12345-def67890-ghi12345-jkl67890" },
                { t: 5.678, type: "milestone", name: "convergence", residual: 0.001 }
            ];

            try {
                // Compute hash using our implementation
                const computedRoot = await computeEventRoot(testEvents);

                results.innerHTML += `
                    <p><strong>Test Events:</strong> ${testEvents.length} events</p>
                    <p><strong>Computed Root:</strong> <code>${computedRoot}</code></p>
                    <p><strong>Expected Root:</strong> <code>sha256-6bf6ce0da13e3d0196c5a89b809a8ce3589e82f54bd07d15bcabc1cfa2220b6a</code></p>
                    <p class="${computedRoot === 'sha256-6bf6ce0da13e3d0196c5a89b809a8ce3589e82f54bd07d15bcabc1cfa2220b6a' ? 'success' : 'error'}">
                        ${computedRoot === 'sha256-6bf6ce0da13e3d0196c5a89b809a8ce3589e82f54bd07d15bcabc1cfa2220b6a' ? '✅' : '❌'} Match
                    </p>
                `;

                // Show canonical strings for debugging
                results.innerHTML += '<p><strong>Canonical event strings:</strong></p>';
                testEvents.forEach((ev, i) => {
                    const canonical = canonicalString(ev);
                    results.innerHTML += `<p><code>Event ${i}: ${canonical}</code></p>`;
                });

            } catch (error) {
                results.innerHTML += `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        // Auto-run test
        window.addEventListener('load', () => {
            setTimeout(() => {
                testHashConsistency();
            }, 100);
        });
    </script>
</body>
</html>
