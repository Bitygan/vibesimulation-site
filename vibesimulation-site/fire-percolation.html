    <script>
        // Fire Percolation Simulation - SAX SOP v2.3 Compliant
        (function() {
            // Canvas and Context
            const canvas = document.getElementById('fire-canvas');
            const ctx = canvas.getContext('2d');

            // Simulation Parameters - High Density Grid
            const G_X = 320; // Grid width (100x denser than original 96)
            const G_Y = 240; // Grid height
            const CELL_SIZE_X = 5; // Pixel size per cell X
            const CELL_SIZE_Y = 5; // Pixel size per cell Y
            const W = G_X * CELL_SIZE_X; // 1600 pixels wide
            const H = G_Y * CELL_SIZE_Y; // 1200 pixels tall

            // Set canvas size to match HTML dimensions
            canvas.width = 1600;
            canvas.height = 1200;

            // Simulation State - High Density Grid
            let grid = new Uint8Array(G_X * G_Y).fill(1); // 0: ash, 1: tree, 2: burning
            let spreadProb = 0.35;
            let running = true;
            let brushMode = 'ignite';
            let animationId = null;

            // SAX SOP v2.3 - Tamper-evident Recording
            class Ledger {
                constructor() {
                    this.events = [];
                    this.lastHash = "";
                    this.keyPair = null;
                    this.sessionStart = Date.now();
                }

                async init() {
                    try {
                        this.keyPair = await crypto.subtle.generateKey(
                            { name: 'Ed25519' },
                            true, ['sign', 'verify']
                        );
                    } catch (e) {
                        console.warn('Ed25519 unavailable; exporting unsigned reel.', e);
                    }
                }

                async record(type, data) {
                    const ev = {
                        t: performance.now() / 1000,
                        type,
                        data: this.canonicalize(data),
                        prev: this.lastHash || null,
                        hash: ''
                    };

                    const toHash = JSON.stringify({
                        prev: ev.prev,
                        t: ev.t,
                        type: ev.type,
                        data: ev.data
                    });

                    ev.hash = await this.sha256(toHash);
                    this.lastHash = ev.hash;
                    this.events.push(ev);
                }

                canonicalize(obj) {
                    if (obj === null || typeof obj !== 'object') return obj;
                    if (Array.isArray(obj)) return obj.map(item => this.canonicalize(item));
                    const out = {};
                    for (const k of Object.keys(obj).sort()) {
                        out[k] = this.canonicalize(obj[k]);
                    }
                    return out;
                }

                async sha256(str) {
                    const buf = new TextEncoder().encode(str);
                    const hash = await crypto.subtle.digest('SHA-256', buf);
                    return Array.from(new Uint8Array(hash))
                        .map(b => b.toString(16).padStart(2, '0'))
                        .join('');
                }

                async computeEventRoot(events) {
                    let prev = new Uint8Array(32); // Start with empty hash

                    for (const event of events) {
                        // Canonicalize and stringify event
                        const canonicalEvent = this.canonicalize(event);
                        const eventString = JSON.stringify(canonicalEvent);

                        // Concatenate previous hash with event data
                        const eventBytes = new TextEncoder().encode(eventString);
                        const data = new Uint8Array(prev.length + eventBytes.length);
                        data.set(prev);
                        data.set(eventBytes, prev.length);

                        // Compute new hash
                        prev = new Uint8Array(await crypto.subtle.digest('SHA-256', data));
                    }

                    // Return as hex string with prefix
                    return 'sha256-' + Array.from(prev).map(b => b.toString(16).padStart(2, '0')).join('');
                }

                async exportReel() {
                    if (this.events.length === 0) {
                        alert('No simulation data to export. Please interact with the simulation first.');
                        return;
                    }

                    // Compute event root for tamper-evident verification
                    const eventRoot = await ledger.computeEventRoot(this.events);

                    // Create metadata object (first line of file)
                    const metaData = {
                        spec: 'saxlg/1',
                        simulation: 'fire-percolation',
                        version: '2025.08.30',
                        generator: 'PCG32-JS (compat)',
                        user_seed: Math.floor(Math.random() * 1e9),
                        resolution: [W, H],
                        fps: 60,
                        deep_link: window.location.href,
                        event_root: eventRoot,
                        event_count: this.events.length,
                        session_duration: Date.now() - ledger.sessionStart
                    };

                    // Add signature if keyPair exists
                    if (this.keyPair) {
                        try {
                            // Sign just the metadata (excluding signature fields)
                            const metaToSign = { ...metaData };
                            delete metaToSign.sig_alg;
                            delete metaToSign.pub;
                            delete metaToSign.sig;
                            // Ensure event_root is included for verification
                            metaToSign.event_root = metaData.event_root;

                            const payload = new TextEncoder().encode(JSON.stringify(this.canonicalize(metaToSign)));
                            const sig = await crypto.subtle.sign(
                                { name: 'Ed25519' },
                                this.keyPair.privateKey, payload
                            );
                            const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig)));
                            const pub = await crypto.subtle.exportKey('raw', this.keyPair.publicKey);
                            const pubB64 = btoa(String.fromCharCode(...new Uint8Array(pub)));

                            metaData.sig_alg = 'ed25519';
                            metaData.pub = pubB64;
                            metaData.sig = sigB64;
                        } catch (e) {
                            console.warn('Ed25519 sign failed; exporting unsigned reel.', e);
                        }
                    }

                    // Create file content: metadata JSON + each event as separate line
                    const fileContent = JSON.stringify(metaData) + '\n' +
                        this.events.map(event => JSON.stringify(this.canonicalize(event))).join('\n');

                    // Create and download the file
                    const blob = new Blob([fileContent], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `fire-percolation_${Date.now()}.saxlg`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);

                    console.log('🔥 Exported Fire Percolation Reel:', metaData);
                    alert('Fire Percolation Reel exported successfully!\nFile: ' + a.download + '\nFormat: Compatible with Verifier');
                }
            }

            // Initialize Ledger
            const ledger = new Ledger();
            ledger.init();

            // Simulation Functions
            function initForest() {
                grid.fill(1); // All trees initially
                // Ignite some left-edge cells deterministically
                for (let y = 0; y < G_Y; y++) {
                    if (Math.random() < 0.1) {
                        grid[y * G_X + 0] = 2; // Burning
                    }
                }
                ledger.record('simulation_start', { mode: 'forest_init' });
            }

            function runFireStep() {
                const next = new Uint8Array(grid);
                let burning = 0;

                for (let y = 0; y < G_Y; y++) {
                    for (let x = 0; x < G_X; x++) {
                        const i = y * G_X + x;
                        const v = grid[i];

                        if (v === 2) { // Burning
                            next[i] = 3; // → Ash
                            burning++;

                            // Spread to neighbors
                            const neighbors = [
                                [x + 1, y], [x - 1, y],
                                [x, y + 1], [x, y - 1]
                            ];

                            for (const [nx, ny] of neighbors) {
                                if (nx >= 0 && nx < G_X && ny >= 0 && ny < G_Y) {
                                    const ni = ny * G_X + nx;
                                    if (grid[ni] === 1 && Math.random() < spreadProb) {
                                        next[ni] = 2; // Ignite neighbor
                                    }
                                }
                            }
                        }
                    }
                }

                grid = next;
                return burning;
            }

            function paint(x, y, mode) {
                const gx = Math.floor(x / CELL_SIZE_X);
                const gy = Math.floor(y / CELL_SIZE_Y);

                if (gx < 0 || gy < 0 || gx >= G_X || gy >= G_Y) return;

                const i = gy * G_X + gx;
                const brushSize = 5; // Larger brush for high-density grid

                for (let dy = -brushSize; dy <= brushSize; dy++) {
                    for (let dx = -brushSize; dx <= brushSize; dx++) {
                        const nx = gx + dx;
                        const ny = gy + dy;

                        if (nx >= 0 && nx < G_X && ny >= 0 && ny < G_Y) {
                            const ni = ny * G_X + nx;

                            if (mode === 'break') {
                                grid[ni] = 0; // Ash/firebreak
                            } else if (mode === 'tree') {
                                if (grid[ni] === 0) grid[ni] = 1; // Plant tree on ash
                            } else if (mode === 'ignite') {
                                if (grid[ni] === 1) grid[ni] = 2; // Ignite tree
                            }
                        }
                    }
                }

                ledger.record('brush_apply', { x: gx, y: gy, mode, brushSize });
            }

            function render() {
                ctx.clearRect(0, 0, W, H);

                for (let y = 0; y < G_Y; y++) {
                    for (let x = 0; x < G_X; x++) {
                        const i = y * G_X + x;
                        const v = grid[i];

                        let color;
                        if (v === 0) color = '#374151'; // Ash
                        else if (v === 1) color = '#16a34a'; // Tree
                        else if (v === 2) color = '#ef4444'; // Burning
                        else color = '#6b7280'; // Burnt

                        ctx.fillStyle = color;
                        ctx.fillRect(x * CELL_SIZE_X, y * CELL_SIZE_Y, CELL_SIZE_X, CELL_SIZE_Y);
                    }
                }
            }

            function updateStats() {
                let trees = 0, burning = 0;
                let percolated = false;

                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] === 1) trees++;
                    if (grid[i] === 2) burning++;
                }

                // Check percolation (fire reached right edge)
                for (let y = 0; y < G_Y; y++) {
                    if (grid[y * G_X + (G_X - 1)] === 2) {
                        percolated = true;
                        break;
                    }
                }

                const density = trees / (G_X * G_Y);

                // Update UI
                document.getElementById('trees-count').textContent = trees;
                document.getElementById('burning-count').textContent = burning;
                document.getElementById('percolation-status').textContent = percolated ? 'Yes' : 'No';
                document.getElementById('density-value').textContent = density.toFixed(2);

                // Add visual effect for percolation
                const statusEl = document.getElementById('percolation-status');
                if (percolated) {
                    statusEl.parentElement.classList.add('percolated');
                } else {
                    statusEl.parentElement.classList.remove('percolated');
                }

                return { trees, burning, percolated, density };
            }

            function animate() {
                if (running) {
                    const burning = runFireStep();
                    if (burning === 0 && grid.every(v => v !== 2)) {
                        running = false; // Stop when fire is out
                        const startBtn = document.getElementById('start-btn');
                        startBtn.innerHTML = '<i class="fas fa-play"></i> Start Fire';
                        startBtn.className = 'canvas-btn start';
                    }
                }

                render();
                updateStats();
                animationId = requestAnimationFrame(animate);
            }

            // Event Listeners - IMMEDIATE TOUCH RESPONSE
            canvas.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                paint(x, y, brushMode);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (e.buttons === 1) { // Left mouse button held
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    paint(x, y, brushMode);
                }
            });

            // Touch support - IMMEDIATE RESPONSE
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    paint(x, y, brushMode);
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    paint(x, y, brushMode);
                }
            });

            // Canvas overlay control buttons
            function updateBrushModeButtons(activeMode) {
                // Remove active class from all brush buttons
                ['ignite-btn', 'tree-btn', 'break-btn'].forEach(id => {
                    document.getElementById(id).classList.remove('active');
                });
                // Add active class to current mode
                document.getElementById(activeMode + '-btn').classList.add('active');

                // Update canvas cursor based on brush mode
                const canvas = document.getElementById('fire-canvas');
                canvas.className = 'fire-canvas ' + activeMode + '-mode';
            }

            document.getElementById('ignite-btn').addEventListener('click', () => {
                brushMode = 'ignite';
                updateBrushModeButtons('ignite');
                ledger.record('mode_change', { mode: 'ignite' });
            });

            document.getElementById('break-btn').addEventListener('click', () => {
                brushMode = 'break';
                updateBrushModeButtons('break');
                ledger.record('mode_change', { mode: 'break' });
            });

            document.getElementById('tree-btn').addEventListener('click', () => {
                brushMode = 'tree';
                updateBrushModeButtons('tree');
                ledger.record('mode_change', { mode: 'tree' });
            });

            document.getElementById('start-btn').addEventListener('click', () => {
                running = true;
                const btn = document.getElementById('start-btn');
                btn.innerHTML = '<i class="fas fa-pause"></i> Stop Fire';
                btn.className = 'canvas-btn stop';
                ledger.record('control', { action: 'run' });
            });

            document.getElementById('reset-btn').addEventListener('click', () => {
                initForest();
                running = false;
                const startBtn = document.getElementById('start-btn');
                startBtn.innerHTML = '<i class="fas fa-play"></i> Start Fire';
                startBtn.className = 'canvas-btn start';
                ledger.record('control', { action: 'reset' });
            });

            // Spread probability control
            document.getElementById('spread-prob').addEventListener('input', (e) => {
                spreadProb = parseFloat(e.target.value);
                document.getElementById('spread-value').textContent = spreadProb.toFixed(2);
                ledger.record('parameter_change', { parameter: 'spreadProb', value: spreadProb });
            });

            // Accreditation system
            document.getElementById('accreditation-toggle').addEventListener('change', (e) => {
                const controls = document.getElementById('accreditation-controls');
                if (e.target.checked) {
                    controls.classList.add('active');
                } else {
                    controls.classList.remove('active');
                }
            });

            document.getElementById('run-accreditation').addEventListener('click', async () => {
                const repCount = parseInt(document.getElementById('rep-count').value);
                const results = [];

                // Run replications
                for (let r = 0; r < repCount; r++) {
                    const testGrid = new Uint8Array(G_X * G_Y).fill(1);
                    // Initialize with same pattern
                    for (let y = 0; y < G_Y; y++) {
                        if (Math.random() < 0.1) testGrid[y * G_X + 0] = 2;
                    }

                    let burning = 1, steps = 0, percolated = false;
                    while (burning > 0 && steps < 2000) {
                        const next = new Uint8Array(testGrid);
                        burning = 0;

                        for (let y = 0; y < G_Y; y++) {
                            for (let x = 0; x < G_X; x++) {
                                const i = y * G_X + x;
                                const v = testGrid[i];

                                if (v === 2) {
                                    next[i] = 3;
                                    burning++;

                                    const neighbors = [
                                        [x + 1, y], [x - 1, y],
                                        [x, y + 1], [x, y - 1]
                                    ];

                                    for (const [nx, ny] of neighbors) {
                                        if (nx >= 0 && nx < G_X && ny >= 0 && ny < G_Y) {
                                            const ni = ny * G_X + nx;
                                            if (testGrid[ni] === 1 && Math.random() < spreadProb) {
                                                next[ni] = 2;
                                            }
                                        }
                                    }
                                }
                            }
                        }

                        testGrid.set(next);
                        percolated = percolated || testGrid.some((v, i) => (i % G_X) === (G_X - 1) && v === 2);
                        steps++;
                    }

                    results.push(percolated ? 1 : 0);
                }

                // Calculate statistics
                const mean = results.reduce((a, b) => a + b, 0) / results.length;
                const variance = results.reduce((a, b) => a + (b - mean) ** 2, 0) / results.length;
                const stdDev = Math.sqrt(variance);

                // 95% confidence interval (t-distribution approximation)
                const t95 = 1.96; // Approximation for n > 30
                const margin = t95 * stdDev / Math.sqrt(repCount);
                const lower = Math.max(0, mean - margin);
                const upper = Math.min(1, mean + margin);

                // Update UI
                const resultDiv = document.getElementById('accreditation-result');
                document.getElementById('prob-value').textContent = (mean * 100).toFixed(1) + '%';
                document.getElementById('confidence-fill').style.width = (mean * 100) + '%';
                document.getElementById('confidence-interval').textContent =
                    `${(lower * 100).toFixed(1)}% - ${(upper * 100).toFixed(1)}% (95% CI)`;
                resultDiv.style.display = 'block';

                // Record in ledger
                await ledger.record('accreditation_complete', {
                    replications: repCount,
                    percolation_prob: mean,
                    ci_lower: lower,
                    ci_upper: upper,
                    std_dev: stdDev
                });
            });

            // Export Reel Button
            document.getElementById('fp-export').addEventListener('click', async () => {
                ledger.record('export', {action: 'export_requested'});
                await ledger.exportReel();
            });

            // Verify Reel Button
            document.getElementById('fp-verify').addEventListener('click', () => {
                ledger.record('verify', {action: 'verify_page_opened'});
                window.open("verify.html","_blank");
            });

            // Export functionality (hidden, triggered by long press)
            let exportTimeout;
            canvas.addEventListener('pointerdown', () => {
                exportTimeout = setTimeout(async () => {
                    await ledger.exportReel();
                    // Visual feedback
                    const originalCursor = canvas.style.cursor;
                    canvas.style.cursor = 'progress';
                    setTimeout(() => canvas.style.cursor = originalCursor, 1000);
                }, 2000); // 2 second long press
            });

            canvas.addEventListener('pointerup', () => {
                clearTimeout(exportTimeout);
            });

            canvas.addEventListener('pointerleave', () => {
                clearTimeout(exportTimeout);
            });

            // Initialize and start
            initForest();
            updateBrushModeButtons('ignite'); // Set initial active state
            animate();

        })();
    </script>
</body>
</html>
