<!DOCTYPE html>
<html>
<head>
    <title>Test Circuit Lab</title>
    <style>
        body { margin: 0; padding: 20px; background: #0a0a0a; color: white; }
        .test-result { padding: 10px; margin: 5px; border-radius: 5px; }
        .pass { background: #10b981; }
        .fail { background: #ef4444; }
    </style>
</head>
<body>
    <h1>Circuit Lab Test</h1>
    <div id="test-results"></div>

    <script>
        const results = document.getElementById('test-results');

        function test(name, condition, message) {
            const div = document.createElement('div');
            div.className = 'test-result ' + (condition ? 'pass' : 'fail');
            div.textContent = (condition ? '✓' : '✗') + ' ' + name + ': ' + message;
            results.appendChild(div);
        }

        // Test 1: Check if circuit_lab.js loads
        setTimeout(() => {
            const scripts = document.querySelectorAll('script[src*="circuit_lab"]');
            test('Circuit Lab Script', scripts.length > 0, 'Script loaded: ' + scripts.length);

            // Test 2: Check if CircuitComponent is available
            test('CircuitComponent Class', typeof CircuitComponent !== 'undefined', 'CircuitComponent available');

            // Test 3: Check if InteractiveCircuitLab is available
            test('InteractiveCircuitLab Class', typeof InteractiveCircuitLab !== 'undefined', 'InteractiveCircuitLab available');

            // Test 4: Check if new component types are supported
            const comp = new CircuitComponent('lightbulb', 100, 100, 0);
            test('Light Bulb Component', comp.type === 'lightbulb', 'Light bulb component created');

            const comp2 = new CircuitComponent('switch', 100, 100, 0);
            test('Switch Component', comp2.type === 'switch', 'Switch component created');

            // Test 5: Check drawing methods exist
            test('Light Bulb Draw Method', typeof comp.drawLightBulb === 'function', 'Light bulb draw method exists');
            test('Switch Draw Method', typeof comp2.drawSwitch === 'function', 'Switch draw method exists');
            test('Realistic Battery Draw', typeof comp.drawRealisticBattery === 'function', 'Realistic battery draw exists');

            // Test 6: Check if circuit solving works
            const lab = new InteractiveCircuitLab();
            test('Circuit Lab Instance', lab instanceof InteractiveCircuitLab, 'Circuit lab instance created');

        }, 1000);
    </script>

    <!-- Load the circuit lab script -->
    <script src="circuit_lab.js"></script>
</body>
</html>
