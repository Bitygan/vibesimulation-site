<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#oceanGradient)" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>

  <!-- Wave Emoji/Icon - Centered -->
  <text x="100" y="110" font-size="64" text-anchor="middle" dominant-baseline="middle">🌊</text>

  <!-- Brand Text - Below wave -->
  <text x="100" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">
    VibeSimulation
  </text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>

