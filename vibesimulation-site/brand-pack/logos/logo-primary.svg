<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for visibility -->
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Wave Emoji/Icon -->
  <text x="35" y="70" font-size="48" text-anchor="middle" dominant-baseline="middle">🌊</text>

  <!-- Brand Text -->
  <text x="90" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">
    Vibe
  </text>
  <text x="90" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#60a5fa">
    Simulation
  </text>

  <!-- Subtle accent line -->
  <line x1="85" y1="52" x2="320" y2="52" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
</svg>

