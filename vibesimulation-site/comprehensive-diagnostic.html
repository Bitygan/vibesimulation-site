<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comprehensive Diagnostic</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #f5f5f5; }
        .diagnostic-section { margin: 20px 0; padding: 15px; border: 2px solid #ddd; border-radius: 8px; background: white; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .warning { color: orange; font-weight: bold; }
        .info { color: blue; font-weight: bold; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .test-btn { background: #007bff; color: white; }
        .clear-btn { background: #6c757d; color: white; }
        .output { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 5px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .status { padding: 5px 10px; border-radius: 3px; font-weight: bold; }
        .critical { background: #f8d7da; color: #721c24; }
        .operational { background: #d4edda; color: #155724; }
        .progress { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>🩺 Comprehensive VibeSimulation Diagnostic</h1>

    <div class="diagnostic-section">
        <h2>📊 System Status Overview</h2>
        <div id="system-status" class="output">
            Initializing diagnostic system...
        </div>
    </div>

    <div class="diagnostic-section">
        <h2>🌐 Server & Network</h2>
        <button class="test-btn" onclick="testServerConnection()">Test Server Connection</button>
        <button class="test-btn" onclick="testAssetLoading()">Test Asset Loading</button>
        <div id="network-results" class="output"></div>
    </div>

    <div class="diagnostic-section">
        <h2>🎮 Simulations</h2>
        <button class="test-btn" onclick="testSimulationInstances()">Test Simulation Instances</button>
        <button class="test-btn" onclick="testSimulationDetection()">Test Simulation Detection</button>
        <div id="simulation-results" class="output"></div>
    </div>

    <div class="diagnostic-section">
        <h2>📹 Reasoning Reels</h2>
        <button class="test-btn" onclick="testRecorderSystem()">Test Recorder System</button>
        <button class="test-btn" onclick="testRecorderEvents()">Test Event Recording</button>
        <div id="recorder-results" class="output"></div>
    </div>

    <div class="diagnostic-section">
        <h2>🧪 Evidence Drawer</h2>
        <button class="test-btn" onclick="testEvidenceDrawer()">Test Evidence Drawer</button>
        <button class="test-btn" onclick="testFloatingButton()">Test Floating Button</button>
        <div id="evidence-results" class="output"></div>
    </div>

    <div class="diagnostic-section">
        <h2>🔧 Hash Computation</h2>
        <button class="test-btn" onclick="testHashFunctions()">Test Hash Functions</button>
        <button class="test-btn" onclick="testCanonicalization()">Test Canonicalization</button>
        <div id="hash-results" class="output"></div>
    </div>

    <div class="diagnostic-section">
        <h2>📋 Console Logs</h2>
        <button class="clear-btn" onclick="clearConsole()">Clear Console</button>
        <div id="console-results" class="output"></div>
    </div>

    <div class="diagnostic-section">
        <h2>🎯 Actions</h2>
        <button class="test-btn" onclick="runAllTests()">Run All Tests</button>
        <button class="test-btn" onclick="generateReport()">Generate Report</button>
        <div id="action-results" class="output"></div>
    </div>

    <script>
        // ---------- Global State ----------
        let testResults = {};
        let consoleLogs = [];

        // ---------- Utility Functions ----------
        function log(type, message) {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${type}: ${message}`;
            console.log(entry);
            consoleLogs.push(entry);
            updateConsoleDisplay();
        }

        function updateConsoleDisplay() {
            document.getElementById('console-results').textContent =
                consoleLogs.slice(-50).join('\n'); // Show last 50 entries
        }

        function clearConsole() {
            consoleLogs = [];
            updateConsoleDisplay();
        }

        function updateResults(section, content) {
            document.getElementById(section + '-results').textContent = content;
            testResults[section] = content;
        }

        function showStatus(message, type = 'info') {
            return `<span class="status ${type}">${message}</span>`;
        }

        // ---------- System Status ----------
        function updateSystemStatus() {
            let status = '🔍 Running comprehensive diagnostic...\n\n';
            status += '⏰ Timestamp: ' + new Date().toLocaleString() + '\n';
            status += '🌐 URL: ' + window.location.href + '\n';
            status += '📱 User Agent: ' + navigator.userAgent + '\n\n';

            // Check basic DOM
            status += '📄 DOM Status:\n';
            status += '- Body loaded: ' + (document.body ? '✅' : '❌') + '\n';
            status += '- Physics cards: ' + document.querySelectorAll('.physics-card').length + '\n';
            status += '- Scripts loaded: ' + document.querySelectorAll('script').length + '\n\n';

            document.getElementById('system-status').textContent = status;
        }

        // ---------- Network Tests ----------
        async function testServerConnection() {
            log('INFO', 'Testing server connection...');
            updateResults('network', 'Testing server connection...\n');

            try {
                const response = await fetch('./index.html', { method: 'HEAD' });
                if (response.ok) {
                    updateResults('network', showStatus('✅ Server Connection OK', 'operational'));
                    log('SUCCESS', 'Server connection test passed');
                } else {
                    updateResults('network', showStatus('❌ Server Error: ' + response.status, 'critical'));
                    log('ERROR', 'Server connection failed: ' + response.status);
                }
            } catch (error) {
                updateResults('network', showStatus('❌ Network Error: ' + error.message, 'critical'));
                log('ERROR', 'Network test failed: ' + error.message);
            }
        }

        async function testAssetLoading() {
            log('INFO', 'Testing asset loading...');
            updateResults('network', 'Testing asset loading...\n');

            const assets = [
                'assets/css/main.css',
                'assets/css/cookie-consent.css',
                'recorder.js',
                'evidence_drawer.js',
                'app_version.js'
            ];

            let results = '';
            for (const asset of assets) {
                try {
                    const response = await fetch(asset, { method: 'HEAD' });
                    if (response.ok) {
                        results += `✅ ${asset}\n`;
                        log('SUCCESS', `Asset loaded: ${asset}`);
                    } else {
                        results += `❌ ${asset} (${response.status})\n`;
                        log('ERROR', `Asset failed: ${asset} (${response.status})`);
                    }
                } catch (error) {
                    results += `❌ ${asset} (${error.message})\n`;
                    log('ERROR', `Asset error: ${asset} (${error.message})`);
                }
            }

            updateResults('network', results);
        }

        // ---------- Simulation Tests ----------
        function testSimulationInstances() {
            log('INFO', 'Testing simulation instances...');
            let results = 'Testing simulation instances...\n\n';

            const sims = {
                'PaintedSky': window.paintedSkySim,
                'ChargePainter': window.chargePainterSim,
                'ResonantCanvas': window.resonantCanvasSim,
                'DragRangefinder': window.dragRangefinderSim
            };

            let found = 0;
            Object.entries(sims).forEach(([name, sim]) => {
                const status = sim ? '✅' : '❌';
                results += `${status} ${name}: ${sim ? 'Available' : 'Not found'}\n`;
                if (sim) {
                    found++;
                    log('SUCCESS', `Simulation ${name} found`);
                } else {
                    log('ERROR', `Simulation ${name} not found`);
                }
            });

            results += `\nFound ${found}/4 simulation instances\n`;
            updateResults('simulation', results);

            if (found === 0) {
                log('CRITICAL', 'No simulation instances found - this will break most features');
            }
        }

        function testSimulationDetection() {
            log('INFO', 'Testing simulation detection...');
            let results = 'Testing simulation detection...\n\n';

            const cards = document.querySelectorAll('.physics-card');
            results += `Found ${cards.length} physics cards:\n`;

            cards.forEach(card => {
                const id = card.id;
                const visible = card.style.display !== 'none';
                results += `- ${id}: ${visible ? 'Visible' : 'Hidden'}\n`;
            });

            results += '\n';

            // Test the detection logic
            const detectedSim = getCurrentSimName();
            results += `Detected simulation: ${detectedSim || 'None'}\n`;

            if (detectedSim) {
                log('SUCCESS', `Current simulation detected: ${detectedSim}`);
            } else {
                log('ERROR', 'No simulation detected - this will break Evidence Drawer');
            }

            updateResults('simulation', results);
        }

        // ---------- Recorder Tests ----------
        function testRecorderSystem() {
            log('INFO', 'Testing recorder system...');
            let results = 'Testing recorder system...\n\n';

            const recorder = window.reasoningReelsRecorder;
            if (recorder) {
                results += '✅ Global recorder found\n';
                results += `Event count: ${recorder.eventCount || 0}\n`;
                results += `Rows: ${recorder.rows ? recorder.rows.length : 0}\n`;
                results += `Background hashing: ${recorder.worker ? 'Enabled' : 'Disabled'}\n`;

                if (recorder.eventCount > 0) {
                    log('SUCCESS', 'Recorder has recorded events');
                } else {
                    log('WARNING', 'Recorder has no events - try interacting with a simulation');
                }
            } else {
                results += '❌ Global recorder not found\n';
                log('ERROR', 'Global recorder not found - Reasoning Reels will not work');
            }

            updateResults('recorder', results);
        }

        function testRecorderEvents() {
            log('INFO', 'Testing event recording...');
            let results = 'Testing event recording...\n\n';

            const recorder = window.reasoningReelsRecorder;
            if (!recorder) {
                results += '❌ No recorder available\n';
                updateResults('recorder', results);
                return;
            }

            // Try to record a test event
            const testEvent = {
                t: Date.now() / 1000,
                type: 'test',
                message: 'Diagnostic test event'
            };

            try {
                recorder.log(testEvent);
                results += '✅ Test event recorded successfully\n';
                results += `New event count: ${recorder.eventCount}\n`;
                log('SUCCESS', 'Test event recorded successfully');
            } catch (error) {
                results += `❌ Event recording failed: ${error.message}\n`;
                log('ERROR', `Event recording failed: ${error.message}`);
            }

            updateResults('recorder', results);
        }

        // ---------- Evidence Drawer Tests ----------
        function testEvidenceDrawer() {
            log('INFO', 'Testing Evidence Drawer...');
            let results = 'Testing Evidence Drawer...\n\n';

            // Check if evidence drawer is loaded
            if (typeof createFloatingButton === 'function') {
                results += '✅ Evidence Drawer functions loaded\n';
                log('SUCCESS', 'Evidence Drawer functions loaded');
            } else {
                results += '❌ Evidence Drawer functions not loaded\n';
                log('ERROR', 'Evidence Drawer functions not loaded');
            }

            // Check current reel
            if (typeof currentReel !== 'undefined') {
                results += `✅ Current reel: ${currentReel ? 'Loaded' : 'None'}\n`;
                if (currentReel) {
                    results += `Events: ${currentReel.rows ? currentReel.rows.length : 0}\n`;
                }
            } else {
                results += '❌ Current reel variable not defined\n';
                log('ERROR', 'Current reel variable not defined');
            }

            updateResults('evidence', results);
        }

        function testFloatingButton() {
            log('INFO', 'Testing floating button...');
            let results = 'Testing floating button...\n\n';

            const button = document.querySelector('button[style*="fixed"]');
            if (button) {
                results += '✅ Floating button found\n';
                results += `Button text: ${button.textContent}\n`;
                log('SUCCESS', 'Floating button found');
            } else {
                results += '❌ Floating button not found\n';
                log('ERROR', 'Floating button not found - Evidence Drawer may not be initialized');
            }

            updateResults('evidence', results);
        }

        // ---------- Hash Tests ----------
        function testHashFunctions() {
            log('INFO', 'Testing hash functions...');
            let results = 'Testing hash functions...\n\n';

            // Test basic hash functions
            if (typeof hex === 'function') {
                results += '✅ hex() function available\n';
            } else {
                results += '❌ hex() function missing\n';
            }

            if (typeof canonicalize === 'function') {
                results += '✅ canonicalize() function available\n';
            } else {
                results += '❌ canonicalize() function missing\n';
            }

            if (typeof canonicalString === 'function') {
                results += '✅ canonicalString() function available\n';
            } else {
                results += '❌ canonicalString() function missing\n';
            }

            if (typeof concatBytes === 'function') {
                results += '✅ concatBytes() function available\n';
            } else {
                results += '❌ concatBytes() function missing\n';
            }

            // Test a simple hash computation
            try {
                const testData = { type: 'test', value: 42 };
                const canonical = canonicalString(testData);
                const bytes = new TextEncoder().encode(canonical);
                const hash = crypto.subtle.digest('SHA-256', bytes).then(buf =>
                    hex(new Uint8Array(buf))
                );

                results += '✅ Hash computation test passed\n';
                log('SUCCESS', 'Hash functions working');
            } catch (error) {
                results += `❌ Hash computation failed: ${error.message}\n`;
                log('ERROR', `Hash computation failed: ${error.message}`);
            }

            updateResults('hash', results);
        }

        function testCanonicalization() {
            log('INFO', 'Testing canonicalization...');
            let results = 'Testing canonicalization...\n\n';

            const testObj = {
                z: 3,
                a: 1,
                b: 2
            };

            try {
                const canonical = canonicalString(testObj);
                results += `Original: ${JSON.stringify(testObj)}\n`;
                results += `Canonical: ${canonical}\n`;

                // Should be sorted by keys
                if (canonical.includes('"a":1,"b":2,"z":3')) {
                    results += '✅ Key sorting correct\n';
                    log('SUCCESS', 'Canonicalization working correctly');
                } else {
                    results += '❌ Key sorting incorrect\n';
                    log('ERROR', 'Canonicalization key sorting failed');
                }
            } catch (error) {
                results += `❌ Canonicalization failed: ${error.message}\n`;
                log('ERROR', `Canonicalization failed: ${error.message}`);
            }

            updateResults('hash', results);
        }

        // ---------- Helper Functions ----------
        function getCurrentSimName(){
            const cards = document.querySelectorAll('.physics-card');
            for(const card of cards){
                if(card.style.display === 'none') continue;
                const id = card.id;
                if(id === 'fluid-dynamics') return 'PaintedSky';
                if(id === 'electrostatics') return 'ChargePainter';
                if(id === 'wave-physics') return 'ResonantCanvas';
                if(id === 'drag-rangefinder') return 'DragRangefinder';
            }
            return null;
        }

        // ---------- Main Test Runner ----------
        async function runAllTests() {
            log('INFO', 'Starting comprehensive diagnostic...');
            updateResults('action', 'Running all diagnostic tests...\n');

            updateSystemStatus();

            await testServerConnection();
            await testAssetLoading();

            testSimulationInstances();
            testSimulationDetection();

            testRecorderSystem();
            testRecorderEvents();

            testEvidenceDrawer();
            testFloatingButton();

            testHashFunctions();
            testCanonicalization();

            updateResults('action', '✅ All diagnostic tests completed!\n\nCheck the results above for any issues.');
            log('SUCCESS', 'Comprehensive diagnostic completed');
        }

        function generateReport() {
            log('INFO', 'Generating diagnostic report...');
            let report = '🩺 VibeSimulation Diagnostic Report\n';
            report += '=' .repeat(50) + '\n\n';
            report += `Generated: ${new Date().toLocaleString()}\n`;
            report += `URL: ${window.location.href}\n\n`;

            // Compile results
            Object.entries(testResults).forEach(([section, content]) => {
                report += `${section.toUpperCase()}:\n`;
                report += '-'.repeat(30) + '\n';
                report += content + '\n\n';
            });

            // Add recommendations
            report += 'RECOMMENDATIONS:\n';
            report += '-'.repeat(30) + '\n';
            report += '1. Fix any ❌ errors shown above\n';
            report += '2. Ensure all simulation instances are loaded\n';
            report += '3. Verify recorder system is initialized\n';
            report += '4. Check Evidence Drawer components\n';
            report += '5. Test hash computation functions\n\n';

            // Download report
            const blob = new Blob([report], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `vibesimulation-diagnostic-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);

            log('SUCCESS', 'Diagnostic report generated and downloaded');
        }

        // ---------- Initialize ----------
        window.addEventListener('load', () => {
            log('INFO', 'Diagnostic page loaded');
            updateSystemStatus();

            // Auto-run basic tests after a short delay
            setTimeout(() => {
                testSimulationInstances();
                testRecorderSystem();
                testEvidenceDrawer();
            }, 1000);
        });

        // Intercept console messages
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            originalLog.apply(console, args);
            log('LOG', args.join(' '));
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            log('ERROR', args.join(' '));
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            log('WARN', args.join(' '));
        };
    </script>
</body>
</html>
