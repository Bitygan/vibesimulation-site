<!DOCTYPE html>
<html>
<head>
    <title>Circuit Lab Debug</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #111; color: #fff; }
        .log { margin: 10px 0; padding: 10px; border-left: 3px solid #4f46e5; background: #1a1a1a; }
        .error { border-left-color: #ef4444; background: #2a1a1a; }
        .success { border-left-color: #10b981; background: #1a2a1a; }
        button { margin: 5px; padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #6366f1; }
    </style>
</head>
<body>
    <h1>Circuit Lab Debug Tool</h1>
    <div id="logs"></div>
    <button onclick="checkCircuitLab()">Check Circuit Lab</button>
    <button onclick="checkDependencies()">Check Dependencies</button>
    <button onclick="clearLogs()">Clear Logs</button>
    <button onclick="openMainSite()">Open Main Site</button>

    <script>
        const logsDiv = document.getElementById('logs');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function checkCircuitLab() {
            log('Checking Circuit Lab status...', 'info');

            // Check if InteractiveCircuitLab class exists
            if (typeof InteractiveCircuitLab === 'undefined') {
                log('❌ InteractiveCircuitLab class not found', 'error');
                return;
            } else {
                log('✅ InteractiveCircuitLab class found', 'success');
            }

            // Check if instance exists
            if (typeof window.interactiveCircuitLab === 'undefined') {
                log('❌ Circuit Lab instance not found - may not have initialized', 'error');
            } else {
                log('✅ Circuit Lab instance found', 'success');
            }

            // Check DOM elements
            const circuitCard = document.getElementById('circuit-lab');
            if (!circuitCard) {
                log('❌ Circuit Lab card (#circuit-lab) not found in DOM', 'error');
            } else {
                log('✅ Circuit Lab card found in DOM', 'success');
            }

            // Check canvas
            const canvas = document.querySelector('#circuit-lab canvas');
            if (!canvas) {
                log('❌ Circuit Lab canvas not found', 'error');
            } else {
                log('✅ Circuit Lab canvas found', 'success');
            }
        }

        function checkDependencies() {
            log('Checking dependencies...', 'info');

            // Check recorder.js
            if (typeof makeRecorder === 'undefined') {
                log('❌ makeRecorder function not found (recorder.js)', 'error');
            } else {
                log('✅ makeRecorder function found', 'success');
            }

            // Check if circuit_lab.js loaded
            const scripts = document.querySelectorAll('script');
            let circuitLabScript = false;
            scripts.forEach(script => {
                if (script.src.includes('circuit_lab.js')) {
                    circuitLabScript = true;
                }
            });

            if (circuitLabScript) {
                log('✅ circuit_lab.js script tag found', 'success');
            } else {
                log('❌ circuit_lab.js script tag not found', 'error');
            }
        }

        function clearLogs() {
            logsDiv.innerHTML = '';
        }

        function openMainSite() {
            window.open('http://localhost:8081/', '_blank');
        }

        // Auto-run checks on page load
        window.addEventListener('load', () => {
            log('Debug page loaded', 'success');
            setTimeout(() => {
                checkDependencies();
                checkCircuitLab();
            }, 1000);
        });
    </script>

    <!-- Load the same scripts as the main page -->
    <script src="recorder.js"></script>
    <script src="circuit_lab.js"></script>
</body>
</html>
